<ng-container *transloco="let t">
  <p-table [value]="data" stripedRows>
    <ng-template #header>
      <tr class="bg-gray-400">
        <th class="bg-gray-400">{{ t('name') }}</th>
        <th>{{ t('type') }}</th>
        <th>{{ t('created') }}</th>
        <th></th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template #body let-item>
      <tr>
        <td>{{ item.name }}</td>
        <td>{{ t(item.key) }}</td>
        <td>{{ item.created | date: 'mediumDate' }}</td>
        <td>
          <a
            href="#"
            [pTooltip]="t('edit')"
            tooltipPosition="top"
            [routerLink]="[item.id, 'edit']"
            class="text-blue-600"
            ><i class="pi pi-pen-to-square"></i
          ></a>
        </td>
        <td>
          <button
            type="button"
            pTooltip="Borrar"
            tooltipPosition="top"
            (click)="handleDelete(item.id)"
            class="text-red-600">
            <i class="pi pi-trash"></i>
          </button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</ng-container>

<p-confirmdialog />
<p-toast />
