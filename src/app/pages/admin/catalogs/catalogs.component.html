<ng-container *transloco="let t">
  <h1 class="mb-4">Catálogos</h1>

  <div class="flex justify-between">
    <app-catalog-filter
      [catalogTypes]="categories"
      (filterChange)="handleFilter($event)" />

    <div>
      <button (click)="openCreateDialog()" class="btn-primary">
        <i class="pi pi-plus"></i> Nuevo
      </button>
    </div>
  </div>

  @if (catalogs$ | async; as data) {
    <p-table [value]="data.results" stripedRows>
      <ng-template #header>
        <tr>
          <th></th>
          <th>Nombre</th>
          <th>Categoria</th>
          <th>Creado</th>
          <th></th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template #body let-item let-rowIndex="rowIndex">
        <tr>
          <td>{{ rowIndex + 1 }}</td>
          <td>{{ item.name }}</td>
          <td>{{ item.key_display }}</td>
          <td>{{ item.created | date: 'mediumDate' }}</td>
          <td>
            <button
              [pTooltip]="t('edit')"
              tooltipPosition="top"
              (click)="openEditDialog(item)"
              class="text-blue-600">
              <i class="pi pi-pen-to-square"></i>
            </button>
          </td>
          <td>
            <button
              type="button"
              pTooltip="Borrar"
              tooltipPosition="top"
              (click)="confirmDelete(item.id)"
              class="text-red-600">
              <i class="pi pi-trash"></i>
            </button>
          </td>
        </tr>
      </ng-template>
    </p-table>

    <p-paginator
      showCurrentPageReport="true"
      currentPageReportTemplate="{first} - {last} de {totalRecords}"
      (onPageChange)="handlePage($event)"
      [first]="first"
      [rows]="rows"
      [totalRecords]="data.count" />
  } @else {
    <p-progressSpinner [style]="{ width: '40px', height: '40px' }" />
  }
</ng-container>
<p-confirmdialog />
<p-toast />
