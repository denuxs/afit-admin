<h1 class="mb-4">Catálogos</h1>

<app-catalog-filter
  [catalogTypes]="catalogTypes"
  (filterChange)="handleFilter($event)"></app-catalog-filter>

@if (catalogs$ | async; as data) {
  <app-catalog-list [data]="data" (deleteChange)="handleDelete($event)" />
} @else {
  <p-progressSpinner [style]="{ width: '40px', height: '40px' }" />
}
