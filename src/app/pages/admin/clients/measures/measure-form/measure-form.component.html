<!-- <measure-images [measureId]="measureId"></measure-images> -->

<form [formGroup]="measureForm" (ngSubmit)="handleSubmit()" class="col-span-2">
  <app-prime-editor [form]="measureForm" controlName="comment" label="Notas" />

  <div class="grid grid-cols-4 gap-4">
    <app-prime-input [form]="measureForm" controlName="weight" label="Peso" />
    <app-prime-input [form]="measureForm" controlName="back" label="Espalda" />
    <app-prime-input [form]="measureForm" controlName="chest" label="Pecho" />
    <app-prime-input
      [form]="measureForm"
      controlName="arm_left"
      label="Brazo izquierdo" />
    <app-prime-input
      [form]="measureForm"
      controlName="arm_right"
      label="Brazo Derecho" />
    <app-prime-input
      [form]="measureForm"
      controlName="forearm"
      label="Antebrazo" />
    <app-prime-input
      [form]="measureForm"
      controlName="abdomen"
      label="Abdomen" />
    <app-prime-input [form]="measureForm" controlName="waist" label="Cintura" />
    <app-prime-input [form]="measureForm" controlName="hips" label="Cadera" />
    <app-prime-input
      [form]="measureForm"
      controlName="leg_left"
      label="Pierna izquierda" />
    <app-prime-input
      [form]="measureForm"
      controlName="leg_right"
      label="Pierna derecha" />
    <app-prime-input
      [form]="measureForm"
      controlName="glutes"
      label="Gluteos" />
  </div>

  <div class="flex items-center">
    <p-checkbox
      inputId="is_active"
      name="is_active"
      [binary]="true"
      formControlName="is_active" />
    <label for="is_active" class="ml-2">Es Activo?</label>
  </div>

  <div class="flex justify-end">
    <button class="btn-primary mt-4" type="submit">Guardar</button>
  </div>
</form>
