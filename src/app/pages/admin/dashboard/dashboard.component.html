<h1 class="mb-4">Inicio</h1>

@if (dashboard$ | async; as data) {
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 rounded-2xl mt-4">
    <div
      class="rounded-2xl p-4 flex flex-col justify-center bg-sky-100 dark:bg-opacity-75"
    >
      <div class="flex justify-between items-center relative">
        <div>
          <div class="mb-4 text-gray-900 font-bold">Rutinas</div>
          <h1 class="mb-1 text-gray-900">{{ data.workouts }}</h1>
        </div>
        <div
          class="flex items-center justify-center min-h-12 min-w-12 max-h-12 max-w-12 bg-gray-900 text-white rounded-full text-2xl"
        >
          <svg
            stroke="currentColor"
            fill="none"
            stroke-width="2"
            viewBox="0 0 24 24"
            stroke-linecap="round"
            stroke-linejoin="round"
            height="1em"
            width="1em"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M10 20.777a8.942 8.942 0 0 1 -2.48 -.969"></path>
            <path d="M14 3.223a9.003 9.003 0 0 1 0 17.554"></path>
            <path d="M4.579 17.093a8.961 8.961 0 0 1 -1.227 -2.592"></path>
            <path
              d="M3.124 10.5c.16 -.95 .468 -1.85 .9 -2.675l.169 -.305"
            ></path>
            <path d="M6.907 4.579a8.954 8.954 0 0 1 3.093 -1.356"></path>
            <path d="M12 9l-2 3h4l-2 3"></path>
          </svg>
        </div>
      </div>
    </div>
    <div
      class="rounded-2xl p-4 flex flex-col justify-center bg-emerald-100 dark:bg-opacity-75"
    >
      <div class="flex justify-between items-center relative">
        <div>
          <div class="mb-4 text-gray-900 font-bold">Ejercicios</div>
          <h1 class="mb-1 text-gray-900">{{ data.exercises }}</h1>
        </div>
        <div
          class="flex items-center justify-center min-h-12 min-w-12 max-h-12 max-w-12 bg-gray-900 text-white rounded-full text-2xl"
        >
          <svg
            stroke="currentColor"
            fill="none"
            stroke-width="2"
            viewBox="0 0 24 24"
            stroke-linecap="round"
            stroke-linejoin="round"
            height="1em"
            width="1em"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path stroke="none" d="M0 0h24v24H0z"></path>
            <path
              d="M7 9.667a2.667 2.667 0 0 1 2.667 -2.667h8.666a2.667 2.667 0 0 1 2.667 2.667v8.666a2.667 2.667 0 0 1 -2.667 2.667h-8.666a2.667 2.667 0 0 1 -2.667 -2.667z"
            ></path>
            <path
              d="M4.012 16.737a2 2 0 0 1 -1.012 -1.737v-10c0 -1.1 .9 -2 2 -2h10c.75 0 1.158 .385 1.5 1"
            ></path>
            <path d="M11 14l2 2l4 -4"></path>
          </svg>
        </div>
      </div>
    </div>
    <div
      class="rounded-2xl p-4 flex flex-col justify-center bg-purple-100 dark:bg-opacity-75"
    >
      <div class="flex justify-between items-center relative">
        <div>
          <div class="mb-4 text-gray-900 font-bold">Usuarios</div>
          <h1 class="mb-1 text-gray-900">{{ data.users }}</h1>
        </div>
        <div
          class="flex items-center justify-center min-h-12 min-w-12 max-h-12 max-w-12 bg-gray-900 text-white rounded-full text-2xl"
        >
          <svg
            stroke="currentColor"
            fill="none"
            stroke-width="2"
            viewBox="0 0 24 24"
            stroke-linecap="round"
            stroke-linejoin="round"
            height="1em"
            width="1em"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M12 3v12"></path>
            <path d="M16 11l-4 4l-4 -4"></path>
            <path d="M3 12a9 9 0 0 0 18 0"></path>
          </svg>
        </div>
      </div>
    </div>
  </div>
} @else {
  <p class="text-center">Cargando...</p>
}
