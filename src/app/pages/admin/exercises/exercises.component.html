<div class="flex justify-between mb-4">
  <h1>Ejercicios</h1>
  <div>
    <a href="#" routerLink="create" class="btn-primary">Nuevo Ejercicio</a>
  </div>
</div>

<ng-container *ngIf="exercises$ | async as data; else loading">
  <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
    <table
      class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400"
    >
      <thead
        class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400"
      >
        <tr>
          <th scope="col" class="px-6 py-3">Nombre</th>
          <th scope="col" class="px-6 py-3">Series</th>
          <th scope="col" class="px-6 py-3">Repeticiones</th>
          <th scope="col" class="px-6 py-3">Musculo</th>
          <th scope="col" class="px-6 py-3">Equipo</th>
          <th scope="col" class="px-6 py-3">Creado</th>
          <th scope="col" class="px-6 py-3"></th>
        </tr>
      </thead>
      <tbody>
        @for (item of data; track item.id) {
          <tr
            class="odd:bg-white odd:dark:bg-gray-900 even:bg-gray-50 even:dark:bg-gray-800 border-b dark:border-gray-700 border-gray-200"
          >
            <th
              scope="row"
              class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap dark:text-white"
            >
              {{ item.name }}
            </th>
            <td class="px-6 py-4">
              {{ item.sets }}
            </td>
            <td class="px-6 py-4">
              {{ item.repts }}
            </td>
            <td class="px-6 py-4">{{ item.muscle.name }}</td>
            <td class="px-6 py-4">{{ item.equipment?.name }}</td>
            <td class="px-6 py-4">
              {{ item.created | date: "mediumDate" }}
            </td>
            <td class="px-6 py-4">
              <a
                href="#"
                [routerLink]="[item.id, 'edit']"
                class="font-medium text-blue-600 dark:text-blue-500 hover:underline"
                >Editar</a
              >
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</ng-container>
<ng-template #loading>
  <p class="text-center">Cargando...</p>
</ng-template>
