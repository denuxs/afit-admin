<h1 class="mb-4">Medidas</h1>

<div class="flex justify-between mb-2">
  <form [formGroup]="filterForm" (ngSubmit)="handleFilter()">
    <div class="flex space-x-2">
      <div>
        <input
          type="text"
          placeholder="Buscar..."
          class="rounded-md"
          formControlName="search"
        />
      </div>
      <div>
        <button class="btn-primary" type="submit">
          <i class="pi pi-search"></i>
        </button>
      </div>
    </div>
  </form>
  <div>
    <a href="#" routerLink="create" class="btn-primary inline-block"
      ><i class="pi pi-plus"></i> Nuevo Medida</a
    >
  </div>
</div>

@if (measures$ | async; as data) {
  <p-table [value]="data" stripedRows>
    <ng-template #header>
      <tr>
        <th>Usuario</th>
        <th>Comentario</th>
        <th>Activo</th>
        <th>Creado</th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template #body let-item>
      <tr>
        <td>{{ item.user.username }}</td>
        <td>{{ item.comment }}</td>
        <td>{{ item.is_active | yesNo }}</td>
        <td>{{ item.created | date: "mediumDate" }}</td>
        <td>
          <a
            href="#"
            pTooltip="Editar"
            tooltipPosition="top"
            [routerLink]="[item.id, 'edit']"
            class="text-blue-600"
            ><i class="pi pi-pen-to-square"></i
          ></a>
        </td>
      </tr>
    </ng-template>
  </p-table>
}
