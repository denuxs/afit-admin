<table class="w-full text-sm text-left text-gray-500">
  <thead class="text-xs text-gray-700 uppercase bg-gray-200">
    <tr>
      <td scope="col" class="px-4 py-2">Ejercicio</td>
      <td scope="col" class="px-4 py-2">Descripción</td>
      <td scope="col" class="px-4 py-2">Series</td>
      <td scope="col" class="px-4 py-2">Repeticiones</td>
      <td scope="col" class="px-4 py-2"></td>
    </tr>
  </thead>
  @for (item of exercises.controls; track $index; let index = $index) {
    <tr>
      <td class="pt-2 pr-2">
        <p-select
          [options]="exercisesList"
          optionLabel="name"
          optionValue="id"
          [filter]="true"
          filterBy="name"
          [formControl]="item.get('exercise') | formControl"
          class="w-full"
        >
          <ng-template #selectedItem let-selectedOption>
            <div>{{ selectedOption.name }}</div>
          </ng-template>
          <ng-template let-item #item>
            <div>{{ item.name }}</div>
          </ng-template>
        </p-select>
      </td>
      <td class="pt-2 pr-2">
        <input
          type="text"
          id="description"
          name="description"
          class="w-full rounded-md border-gray-300"
          [formControl]="item.get('description') | formControl"
        />
      </td>
      <td class="pt-2 pr-2">
        <input
          type="number"
          id="sets"
          name="sets"
          class="w-full rounded-md border-gray-300"
          [formControl]="item.get('sets') | formControl"
        />
      </td>
      <td class="pt-2 pr-2">
        <input
          type="number"
          id="repts"
          name="repts"
          class="w-full rounded-md border-gray-300"
          [formControl]="item.get('repts') | formControl"
        />
      </td>
      <td class="pt-2 pr-2">
        <p-button
          icon="pi pi-times"
          aria-label="remove"
          (click)="removeExercise(index, item)"
          severity="danger"
        />
      </td>
    </tr>
  }
  <tr>
    <td colspan="4" class="pt-2 pr-2">
      <p-button icon="pi pi-plus" aria-label="add" (click)="addExercise()" />
    </td>
  </tr>
</table>
