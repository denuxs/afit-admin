<h1 class="mb-4">Medidas</h1>

<div class="flex justify-between mb-2">
  <form [formGroup]="filterForm" (ngSubmit)="handleFilter()">
    <div class="flex space-x-2">
      <div>
        <input
          type="text"
          placeholder="Buscar..."
          class="rounded-md"
          formControlName="search" />
      </div>
      <div>
        <button class="btn-primary" type="submit">
          <i class="pi pi-search"></i> Buscar
        </button>
      </div>
    </div>
  </form>
  <div>
    <a href="#" routerLink="create" class="btn-primary inline-block"
      ><i class="pi pi-plus"></i> Nuevo Medida</a
    >
  </div>
</div>

@if (measures$ | async; as data) {
  <p-table [value]="data" stripedRows>
    <ng-template #header>
      <tr>
        <th>Usuario</th>
        <th>Comentario</th>
        <th>Activo</th>
        <th>Creado</th>
        <th></th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template #body let-item>
      <tr>
        <td>
          {{ item.user.first_name }} {{ item.user.last_name }} ({{
            item.user.username
          }})
        </td>
        <td>{{ item.comment }}</td>
        <td>
          @if (item.is_active) {
            <ng-icon
              class="text-green-500 text-xl"
              name="faSolidCircleCheck"></ng-icon>
          } @else {
            <ng-icon
              class="text-red-500 text-xl"
              name="faSolidCircleCheck"></ng-icon>
          }
        </td>
        <td>{{ item.created | date: 'mediumDate' }}</td>
        <td>
          <a
            href="#"
            pTooltip="Editar"
            tooltipPosition="top"
            [routerLink]="[item.id, 'edit']"
            class="text-blue-600"
            ><i class="pi pi-pen-to-square"></i
          ></a>
        </td>
        <td>
          <button
            type="button"
            pTooltip="Borrar"
            tooltipPosition="top"
            (click)="handleDelete(item.id)"
            class="text-red-600">
            <i class="pi pi-trash"></i>
          </button>
        </td>
      </tr>
    </ng-template>
  </p-table>
}
<p-confirmdialog />
