<ng-container *transloco="let t">
  <h1 class="mb-4">Entrenamientos</h1>

  <div class="flex justify-end mb-4">
    <!-- <app-user-filter (filterChange)="handleFilter($event)" /> -->

    <div>
      <a href="#" routerLink="create" class="btn-primary inline-block"
        ><i class="pi pi-plus"></i> Nuevo</a
      >
    </div>
  </div>

  @if (workouts$ | async; as data) {
    <p-table [value]="data.results" stripedRows>
      <ng-template #header>
        <tr class="uppercase">
          <th></th>
          <th>Cliente</th>
          <th>Entreno</th>
          <th>Rutinas</th>
          <th>Creado</th>
          <th></th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template #body let-item let-rowIndex="rowIndex">
        <tr>
          <td>{{ rowIndex + 1 }}</td>
          <td>
            <div class="flex gap-2">
              <div>
                <app-prime-avatar [avatar]="item.client.photo" />
              </div>
              <div>
                <h3>{{ item.client.fullname }}</h3>
                <p class="text-sm text-gray-500">{{ item.client.username }}</p>
              </div>
            </div>
          </td>
          <td>{{ item.title }}</td>
          <td>{{ item.routines.length }}</td>
          <td>{{ item.created | date: 'mediumDate' }}</td>
          <td>
            <a
              href="#"
              pTooltip="Editar"
              tooltipPosition="top"
              [routerLink]="[item.id, 'edit']"
              class="text-blue-600">
              <ng-icon name="faSolidPenToSquare"></ng-icon
            ></a>
          </td>
          <td>
            <button
              type="button"
              pTooltip="Borrar"
              tooltipPosition="top"
              (click)="confirmDelete(item.id)"
              class="text-red-600">
              <i class="pi pi-trash"></i>
            </button>
          </td>
        </tr>
      </ng-template>
    </p-table>

    <p-paginator
      showCurrentPageReport="true"
      currentPageReportTemplate="{first} - {last} de {totalRecords}"
      (onPageChange)="handlePage($event)"
      [first]="first"
      [rows]="rows"
      [totalRecords]="data.count" />
  } @else {
    <p-progressSpinner [style]="{ width: '40px', height: '40px' }" />
  }
</ng-container>
<p-confirmdialog />
<p-toast />
