<form [formGroup]="loginForm" (ngSubmit)="handleSubmit()">
  <app-prime-input [form]="loginForm" controlName="username" label="Usuario" />

  <app-prime-password
    [form]="loginForm"
    controlName="password"
    label="Contraseña" />

  <button
    class="btn-primary w-full"
    type="submit"
    [disabled]="loginForm.invalid">
    Iniciar Sesión
  </button>
</form>
