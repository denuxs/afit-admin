<div class="md:w-1/4 md:mx-auto px-4">
  <div class="mt-4 flex justify-center">
    <img src="logo.png" alt="Logo" />
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="handleSubmit()">
    <div class="mb-2">
      <label for="username" class="form-label">Usuario</label>
      <input
        type="text"
        id="username"
        name="username"
        class="form-input w-full"
        formControlName="username"
      />
      <p class="form-error">{{ checkErrors("username") }}</p>
    </div>

    <div class="mb-2">
      <label for="password" class="form-label">Contraseña</label>
      <input
        type="password"
        id="password"
        name="password"
        class="form-input w-full"
        formControlName="password"
      />
      <p class="form-error">{{ checkErrors("password") }}</p>
    </div>

    @if (!unauthenticated) {
      <p class="form-error text-center mt-2">
        Usuario o contraseña incorrectos
      </p>
    }

    <button class="btn-primary mt-4 w-full" type="submit">
      <span *ngIf="!loginForm.disabled">Iniciar Sesión</span>
      <span *ngIf="loginForm.disabled">Cargando...</span>
    </button>
  </form>
</div>
